name: CI

on:
  push:
    branches: ["**"]

jobs:
  build:
    name: Validate & Package Extension
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies (skip if no package.json)
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping install"
          fi

      # 4. Lint (skip if ESLint not configured)
      - name: Lint
        run: |
          if [ -f .eslintrc* ] || grep -q '"eslint"' package.json 2>/dev/null; then
            npx eslint . --ext .js
          else
            echo "No ESLint config found, skipping lint"
          fi

      # 5. Run tests (skip if no test script)
      - name: Run tests
        run: |
          if grep -q '"test"' package.json 2>/dev/null; then
            npm test
          else
            echo "No test script found, skipping tests"
          fi

      # 6. Validate dist/manifest.json
      - name: Validate manifest.json
        run: |
          if [ ! -f "dist/manifest.json" ]; then
            echo "ERROR: dist/manifest.json not found"
            exit 1
          fi

          # Check valid JSON
          python3 -c "import json; json.load(open('dist/manifest.json'))" \
            && echo "manifest.json is valid JSON" \
            || (echo "ERROR: manifest.json is not valid JSON" && exit 1)

          # Check required fields
          python3 - <<'EOF'
          import json, sys

          with open("dist/manifest.json") as f:
              m = json.load(f)

          required = ["name", "version", "manifest_version"]
          missing = [k for k in required if k not in m]

          if missing:
              print(f"ERROR: manifest.json is missing required fields: {missing}")
              sys.exit(1)

          print(f"manifest.json OK — name={m['name']!r}, version={m['version']!r}, manifest_version={m['manifest_version']}")
          EOF

      # 7. Package dist/ as ZIP
      - name: Package extension as ZIP
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('dist/manifest.json'))['version'])")
          ZIP_NAME="truvideo-jira-extension-v${VERSION}.zip"
          echo "Packaging version $VERSION from dist/ → $ZIP_NAME"

          cd dist
          zip -r "../$ZIP_NAME" . --exclude "*.DS_Store"
          cd -

          echo "ZIP contents:"
          unzip -l "$ZIP_NAME"

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # 8. Upload ZIP as downloadable artifact
      - name: Upload extension ZIP
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-zip
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
